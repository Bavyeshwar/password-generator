<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">

        <link href="/static/styles.css" rel="stylesheet">
        <script src="/static/script.js"></script>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/DrawSVGPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MotionPathPlugin.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollToPlugin.min.js"></script>

        <title>{% block title %}{% endblock %}</title>
    </head>

    <body>
        <nav class="navbar navbar-expand-lg bg-black">
            <div class="container-fluid">
                <ul class="navbar-nav me-auto mt-2">
                    <li class="nav-item">
                        <button type="button" id="homeButton">
                            <span class="homeSVG-container"><img src="/static/images/home.svg" alt="Home" class="icon"></span>
                        </button>
                    </li>
                </ul>
                <a class="navbar-brand text-white my-site-name" href="/">Cybersecurity</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse myNavbar" id="navbarSupportedContent">
                    {% if session["user_id"] %}
                        <ul class="navbar-nav me-auto mt-2 link1">
                            <li class="nav-item"><a class="nav-link text-white my-nav-link" href="/strength">Strength Checker</a></li>
                        </ul>
                        <ul class="navbar-nav me-auto mt-2 link2">
                            <li class="nav-item"><a class="nav-link text-white my-nav-link" href="/password-generator">Password Generator</a></li>
                        </ul>
                        <ul class="navbar-nav me-auto mt-2">
                            <li class="nav-item"><a class="nav-link my-nav-link link4" href="/passphrase-generator">Passphrase Password Generator</a></li>
                        </ul>
                        <ul class="navbar-nav me-auto mt-2 link3">
                            <li class="nav-item"><a class="nav-link text-white my-nav-link" href="/logout" id="logoutLink">Logout</a></li>
                        </ul>
                        <script type="module">
                            import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

                            const auth = getAuth();
                            const link = document.getElementById("logoutLink");

                            link.addEventListener("click", () => {
                                event.preventDefault();

                                signOut(auth).then(() => {
                                    window.location.href = "/logout";
                                }).catch((error) => {
                                    console.log(`Error logging out: ${error}`);
                                });
                            });
                        </script>
                    {% else %}
                        <ul class="navbar-nav ms-auto mt-2">
                            <li class="nav-item"><a class="nav-link text-white my-nav-link" href="/register">Register</a></li>
                            <li class="nav-item"><a class="nav-link text-white my-nav-link" href="/login">Log In</a></li>
                        </ul>
                    {% endif %}
                </div>
             </div>
        </nav>
        <main class="text-center">{% block main %}{% endblock %}</main>
    </body>

</html>
